<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
             font-family: Arial, sans-serif;
                background: #f4f4f4;
        }
        .container {
            width: 80%;
            margin: 50px auto;
            text-align: center;
        }
        .flex-container {
            display: flex;
            gap: 20px;
        }
        .card {
            background-color: white;
            padding: 30px;
            flex: 1;
            border-radius: 10px;
             box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        @media (max-width: 768px) {
            .flex-container {
                flex-direction: column;
            }
            
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Sections</h1>
    <div class="flex-container">
        <div class="card">About</div>
        <div class="card">Goals</div>
        <div class="card">Skills</div>
    </div>
    </div>
</body>
</html>
