<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }

        .hero {
            text-align: center;
            padding: 100px 20px;
            background-color: #f4f4f4;
        }

        .hero h1 {
            font-size: 40px;
        }

        .hero p {
            font-size: 20px;
        }

        .hero button {
            padding: 12px;
            border-radius: 6px;
            background: #000;
            color: white;
        }

        .hero button:hover {
            background-color: #444141;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>I a learning full stack development</p>
        <button>Get Started</button>
    </section>
</body>
</html>
