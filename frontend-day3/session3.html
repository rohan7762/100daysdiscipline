<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background-color: black;
            color: white;
        }
        .nav-links {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        .nav-links li {
    cursor: pointer;
}

.nav-links li:hover {
    color: #ccc;
}
        .hero {
            text-align: center;
            padding: 100px 20px;
            background-color: #f4f4f4;
        }

        .hero h1 {
            font-size: 40px;
             margin-bottom: 10px;
        }

        .hero p {
            font-size: 20px;
             margin-bottom: 20px;
        }

        .hero button {
            padding: 12px;
            border-radius: 6px;
            background: #000;
            color: white;
        }

        .hero button:hover {
            background-color: #444141;
            cursor: pointer;
        }

         .container {
            margin-top: 80px;
           max-width: 1100px;
            width: 90%;
            margin: 50px auto;
            text-align: center;
        }
        .flex-container {
            display: flex;
            gap: 20px;
        }
        .card {
            background-color: white;
            padding: 30px;
            flex: 1;
            border-radius: 10px;
             box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
         .footer {
            text-align: center;
            padding: 20px;
            background: black;
            color: white;
            margin-top: 50px;
        }
        @media (max-width: 768px) {
            .flex-container {
                flex-direction: column;
            }
            .nav-links {
                flex-direction: column;
                align-items: center;
            }
            
        }



    </style>
</head>
<body>
    <nav class="navbar">
        <h2 class="logo">Rohan</h2>

        <ul class="nav-links">
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>I am learning full stack development</p>
        <button>Get Started</button>
    </section>
     <div class="container">
        <h1>My Sections</h1>
    <div class="flex-container">
        <div class="card">
    <h3>About</h3>
    <p>Some info</p>
</div>
        <div class="card">
            <h3>Goals</h3>
            <p>My goal is to be highly skilled full stack developer</p>
        </div>
        <div class="card">
            <h3>Skills</h3>
            <p>My skills are html and css</p>
        </div>
    </div>
    </div>
    <footer class="footer">
        <p>&copy;2026 Rohan. All rights reserved.</p>
    </footer>
</body>
</html>
